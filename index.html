<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System | Home</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="bg-primary text-white">
    <div class="container py-3">
      <div class="d-flex align-items-center gap-3">
      <div class="btn-back-circle"></div>
        <h1 class="h3 mb-0 fw-bold"><a class="text-decoration-none text-white" href="index.html">Booking System</a></h1>
      </div>
    </div>
  </header>

  <main>
    <section class="hero-section py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-11">
            <div class="search-bar-floating">
              <form id="searchForm" class="needs-validation" novalidate>
                <div class="search-bar-shell">
                  <div class="search-bar-icon-column" aria-hidden="true">
                    <span class="search-bar-icon"></span>
                  </div>
                  <div class="search-bar-group">
                    <label class="search-bar-label" for="searchText">Hotel</label>
                    <div class="search-input-container">
                      <input class="search-bar-input" id="searchText" name="searchText" type="text" placeholder="City, hotel name or keyword" required>
                      <button type="button" class="clear-search-btn" id="clearSearchBtn" aria-label="Clear search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16">
                          <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                        </svg>
                      </button>
                    </div>
                  </div>
                  <div class="search-bar-group search-bar-group-wide">
                    <label class="search-bar-label" for="checkInDate">Check-in/out</label>
                    <div class="search-bar-inline-fields">
                      <input class="search-bar-input" id="checkInDate" name="checkInDate" type="date" required>
                      <span class="search-bar-separator">-</span>
                      <input class="search-bar-input" id="checkOutDate" name="checkOutDate" type="date" required>
                    </div>
                  </div>
                  <div class="search-bar-group">
                    <label class="search-bar-label" for="guestCount">Guests and rooms</label>
                    <div class="search-bar-inline-fields">
                      <select class="search-bar-select" id="guestCount" name="guestCount" required>
                        <option value="" selected disabled>Guests</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                        <option value="5">5 Guests</option>
                        <option value="6">6 Guests</option>
                      </select>
                      <span class="search-bar-separator">,</span>
                      <select class="search-bar-select" id="roomCount" name="roomCount" required>
                        <option value="" selected disabled>Rooms</option>
                        <option value="1">1 Room</option>
                        <option value="2">2 Rooms</option>
                        <option value="3">3 Rooms</option>
                        <option value="4">4 Rooms</option>
                      </select>
                    </div>
                  </div>
                  <div class="search-bar-button-column">
                    <button class="btn btn-primary search-bar-button" type="submit">Search</button>
                  </div>
                </div>
                <div id="searchGlobalError" class="search-global-error d-none">Please fill in all fields to search.</div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="pb-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-11 col-xl-10">
            <div class="bg-white border shadow-sm p-4 p-lg-4">
              <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2 mb-4">
                <div>
                  <h2 id="dynamicSectionHeading" class="h4 fw-bold mb-1"></h2>
                  <p id="dynamicSectionSubheading" class="text-secondary mb-0"></p>
                </div>
                <a id="seeMoreDealsLink" class="link-primary fw-semibold d-none" href="searchResults.html">See more deals</a>
              </div>
              <div id="dynamicSectionContent"></div>

              <div class="popular-section-divider"></div>

              <div class="mb-4">
                <h2 class="h4 fw-bold mb-1">Popular Searches</h2>
                <p class="text-secondary mb-0">Click any popular destination to open the search results page.</p>
              </div>
              <div id="popularSearchesCarouselWrapper"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/shared/config.js"></script>
  <script src="js/shared/hotelDatabase.js"></script>
  <script src="js/shared/data.js"></script>
  <script src="js/shared/common.js"></script>
  <script src="js/pages/index.js"></script>
</body>
</html>
