<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StaySimple | Hotel Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="bg-primary text-white">
    <div class="container py-3">
      <div class="d-flex align-items-center gap-3">
        <a href="searchResults.html" class="btn btn-light rounded-circle shadow-sm d-flex align-items-center justify-content-center p-0 text-primary" style="width: 40px; height: 40px;" aria-label="Go back">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
          </svg>
        </a>
        <h1 class="h3 mb-0 fw-bold"><a class="text-decoration-none text-white" href="index.html">Booking System</a></h1>
      </div>
    </div>
  </header>

  <main class="py-5">
    <div class="container">
      <div id="hotelDetailsContent"></div>
      <section id="roomSelectionSection" class="mt-4 d-none"></section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/uploadedHotelSeed.js"></script>
  <script src="js/data.js"></script>
  <script src="js/common.js"></script>
  <script src="js/hotelDetails.js"></script>

  <!-- Image Lightbox Modal -->
  <div class="modal fade" id="imageLightboxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl">
      <div class="modal-content border-0 bg-transparent">
        <div class="modal-header border-0 p-0 position-absolute end-0 top-0 z-3">
          <button type="button" class="btn btn-light rounded-circle p-2 m-3 shadow-sm" data-bs-dismiss="modal" aria-label="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body p-0 text-center position-relative">
          <button id="lightboxPrevBtn" class="btn btn-light rounded-circle position-absolute top-50 start-0 translate-middle-y ms-3 shadow-sm z-3" type="button" aria-label="Previous image">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          
          <img id="lightboxImage" src="" class="img-fluid rounded-4 shadow-lg mx-auto" style="max-height: 85vh; object-fit: contain;" alt="Hotel view">
          
          <button id="lightboxNextBtn" class="btn btn-light rounded-circle position-absolute top-50 end-0 translate-middle-y me-3 shadow-sm z-3" type="button" aria-label="Next image">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
          
          <div class="position-absolute bottom-0 start-50 translate-middle-x mb-4 text-white p-2">
            <span id="lightboxIndex" class="fw-bold fs-5 shadow-sm px-3 py-1 bg-dark bg-opacity-50 rounded-pill"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
